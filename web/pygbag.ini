[DEPENDENCIES]
# Folders pygbag should NOT include in the .apk bundle.
ignoreDirs = ["build", "build-cache", "build\\web", "build\\web-cache", "__pycache__"]
# Files pygbag should NOT include in the .apk bundle.
ignoreFiles = []

[pygbag]
# Pygbag build configuration -- see https://pygame-web.github.io/wiki/pygbag-configuration

# App name shown in the browser tab and PWA install.
name = "Babel's Glyph"

# Internal package id (must be unique-ish for itch.io / web hosts).
package = "babelsglyph"

# CDN version pinned by pygbag itself. Leave default.
# cdn = "https://pygame-web.github.io/cdn/0.9.3/"
